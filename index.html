<!DOCTYPE html>

<html>
<head>
<title>YuliSistema Dashboard</title>
<style>
body {
font-family: Arial;
background: #f5f5f5;
padding: 20px;
}

.board {
display: flex;
gap: 20px;
}

.column {
background: white;
padding: 10px;
width: 250px;
border-radius: 8px;
}

.card {
background: #eaeaea;
padding: 10px;
margin-top: 10px;
border-radius: 6px;
cursor: grab;
} </style>

</head>

<body>

<h1>YuliSistema Dashboard</h1>

<div class="board">

  <div class="board">

  <div class="column">
    <h2>Pendiente</h2>
    <div id="pendiente" class="card-container"></div>
  </div>

  <div class="column">
    <h2>En proceso</h2>
    <div id="proceso" class="card-container"></div>
  </div>

  <div class="column">
    <h2>Terminado</h2>
    <div id="terminado" class="card-container"></div>
  </div>

</div>

<div class="column">
<h3>Fichas Recibidas</h3>
<div class="card">Pedido 235</div>
</div>

<div class="column">
<h3>Prueba Color</h3>
<div class="card">Club Colo Colo</div>
</div>

<div class="column">
<h3>Sublimación</h3>
<div class="card">Pedido 220</div>
</div>

<div class="column">
<h3>Pendientes</h3>
</div>

</div>

</body>
</html>
